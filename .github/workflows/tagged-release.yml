name: tagged-release

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build tagged release
        run: ./gradlew clean build

      - name: prepare release bundle
        run: |
          mkdir -p build/release
          final_jar=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)
          if [ -z "$final_jar" ]; then
            echo "No final jar found in build/libs" >&2
            exit 1
          fi

          cp "$final_jar" build/release/
          git archive --format zip --output "build/release/hystamina-${{ github.ref_name }}-source.zip" HEAD

      - name: capture tagged build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tagged-build-${{ github.ref_name }}
          path: build/release/*
          if-no-files-found: error

      - name: publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: build/release/*
          allowUpdates: true
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          replacesArtifacts: true
          tag: ${{ github.ref_name }}